stages:
  - build
  - deploy

variables:
  IMAGE_NAME: kakazaro/r-open-webui

build_image:
  stage: build
  variables:
    VERSION_TAG: ${CI_COMMIT_TAG}
  tags:
    - windows
    - shell
  script:
    - $JSON_VERSION = $(node -p "require('./package.json').version")
    - echo "Package version $JSON_VERSION (dockerhub)"
    - docker build -f Dockerfile.renesas -t ${IMAGE_NAME}:${VERSION_TAG} .
    - docker login -u ${DOCKER_USER} -p ${DOCKER_PASS}
    - docker push ${IMAGE_NAME}:${IMAGE_TAG}
    - docker rmi ${IMAGE_NAME}:${VERSION_TAG}
  rules:
    - if: $CI_COMMIT_TAG =~ /^r.*/

.deploy_template: &deploy_template
  stage: deploy
  tags:
    - linux
    - deploy
    - web
  variables:
    VERSION_TAG: ${VERSION_TAG}
  script:
    - export DATABRICKS_CLIENT_ID=$DATABRICKS_CLIENT_ID
    - export DATABRICKS_CLIENT_SECRET=$DATABRICKS_CLIENT_SECRET
    # Function to check and load image
    - |
      check_and_load_image() {
        local image_full_name="${IMAGE_NAME}:${VERSION_TAG}"
      
        if docker image inspect "$image_full_name" >/dev/null 2>&1; then
          echo "✅ Image $image_full_name already exists locally"
          return 0
        fi
      
        echo "📥 Image $image_full_name not found, downloading artifacts..."
      
        if ! docker pull "$image_full_name"; then
          echo "❌ Failed to pull image"
          return 1
        fi
      
        echo "✅ Image loaded successfully"
        # Verify the loaded image has the expected tag
        if docker image inspect "$image_full_name" >/dev/null 2>&1; then
          echo "✅ Verified image $image_full_name is available"
        else
          echo "⚠️  Warning: Expected image tag $image_full_name not found after loading"
          docker images | grep "$IMAGE_NAME" || echo "No images found for $IMAGE_NAME"
        fi
      }
    - check_and_load_image
    - docker compose -f $COMPOSE_FILE up --force-recreate -d
    - docker system prune -af

# Rest remains the same...
deploy_production:
  <<: *deploy_template
  variables:
    VERSION_TAG: ${VERSION_TAG}
    COMPOSE_FILE: docker-compose.renesas.yaml
  before_script:
    - cp $SSL_CRT ./ssl/nginx.crt
    - cp $SSL_KEY ./ssl/nginx.key
  rules:
    - if: '$SOURCE_TRIGGER == "request_deploy_production"'

deploy_development:
  <<: *deploy_template
  variables:
    VERSION_TAG: ${VERSION_TAG}
    COMPOSE_FILE: docker-compose.renesas.dev.yaml
  rules:
    - if: '$SOURCE_TRIGGER == "request_deploy_development"'

.stop_template: &stop_template
  stage: deploy
  tags:
    - linux
    - deploy
    - web
  script:
    - docker compose -f $COMPOSE_FILE stop

stop_development:
  <<: *stop_template
  variables:
    COMPOSE_FILE: docker-compose.renesas.dev.yaml
  rules:
    - if: '$SOURCE_TRIGGER == "request_stop_development"'

stop_production:
  <<: *stop_template
  variables:
    COMPOSE_FILE: docker-compose.renesas.yaml
  rules:
    - if: '$SOURCE_TRIGGER == "request_stop_production"'